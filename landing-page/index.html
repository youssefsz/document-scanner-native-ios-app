<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocScanner: PDF Scan - Simple, Private, Local-First Scanning</title>
    <meta name="description"
        content="A minimalistic, local-first iOS app for capturing paper documents, converting them into PDFs, and managing them with ease. No accounts, no cloud, just privacy.">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="assets/favicons/site.webmanifest">
    <meta name="theme-color" content="#ffffff">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            blue: '#007AFF',
                            gray: '#F5F5F7',
                            dark: '#1C1C1E',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #ffffff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .hero-gradient {
            background: radial-gradient(circle at 50% 50%, #f5f5f7 0%, #ffffff 100%);
        }

        .iphone-frame {
            position: relative;
            width: 280px;
            height: 560px;
            background: #1c1c1e;
            border-radius: 40px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.25),
                0 30px 60px -30px rgba(0, 0, 0, 0.3),
                inset 0 -2px 6px 0 rgba(255, 255, 255, 0.1);
            border: 10px solid #333;
            overflow: hidden;
            z-index: 10;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .iphone-frame {
                width: 300px;
                height: 600px;
                border: 12px solid #333;
                border-radius: 50px;
            }
        }

        .iphone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 24px;
            background: #333;
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
            z-index: 20;
        }

        @media (min-width: 768px) {
            .iphone-notch {
                width: 120px;
                height: 30px;
                border-bottom-left-radius: 18px;
                border-bottom-right-radius: 18px;
            }
        }

        .screenshot-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .screenshot {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            transition: opacity 0.5s ease-in-out;
        }

        .btn-apple {
            background: #000000;
            color: white;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s ease;
        }

        .btn-apple:hover {
            background: #1d1d1f;
            transform: scale(1.02);
        }

        .btn-github {
            background: #ffffff;
            color: #000000;
            border: 1px solid #d2d2d7;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s ease;
        }

        .btn-github:hover {
            border-color: #86868b;
            transform: scale(1.02);
        }
    </style>
</head>

<body class="font-sans antialiased overflow-x-hidden">

    <!-- Hero Section -->
    <section class="min-h-screen hero-gradient flex flex-col items-center pt-16 md:pt-24 px-6 relative">

        <!-- Logo -->
        <div class="mb-6 md:mb-8">
            <img src="assets/logo/logo.png" alt="DocScanner: PDF Scan Logo"
                class="w-16 h-16 md:w-20 md:h-20 rounded-2xl shadow-lg ring-1 ring-black/5">
        </div>

        <!-- Title & Subtitle -->
        <div class="text-center max-w-2xl mb-8 md:mb-12">
            <h1
                class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 md:mb-6 bg-clip-text text-transparent bg-gradient-to-b from-black to-gray-600">
                DocScanner: PDF Scan
            </h1>
            <p class="text-lg md:text-2xl text-gray-500 font-medium leading-relaxed px-4">
                Local-first scanning. Privacy by design. <br class="hidden md:block">
                Simple, fast, and stays on your device.
            </p>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 mb-12 md:mb-16 w-full px-6 sm:px-0">
            <!-- Apple Store Button -->
            <a href="https://apps.apple.com/app/id6760237829"
                class="btn-apple group px-8 py-3.5 rounded-full flex items-center justify-center gap-3 shadow-lg w-full sm:w-auto min-w-[200px]">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 384 512">
                    <path
                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                </svg>
                <div class="text-left">
                    <p class="text-[10px] uppercase font-bold opacity-70 leading-none mb-1">Download on the</p>
                    <p class="text-lg font-semibold leading-none">App Store</p>
                </div>
            </a>

            <!-- Open Source Button -->
            <a href="https://github.com/youssefsz/document-scanner-native-ios-app"
                class="btn-github group px-8 py-3.5 rounded-full flex items-center justify-center gap-3 shadow-lg w-full sm:w-auto min-w-[200px]">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                    <path
                        d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                </svg>
                <div class="text-left">
                    <p class="text-[10px] uppercase font-bold opacity-70 leading-none mb-1">View the source</p>
                    <p class="text-lg font-semibold leading-none">GitHub</p>
                </div>
            </a>
        </div>

        <!-- iPhone Frame -->
        <div class="relative">
            <div class="iphone-frame animate-float">
                <div class="iphone-notch"></div>
                <div class="screenshot-container" id="screenshot-slider">
                    <img src="assets/screenshots/home.png" alt="App Home Screenshot" class="screenshot opacity-100"
                        id="screen-1">
                    <img src="assets/screenshots/settings.png" alt="App Settings Screenshot"
                        class="screenshot opacity-0" id="screen-2">
                </div>
            </div>

            <!-- Decorative Elements -->
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-blue-100/50 rounded-full blur-3xl -z-10 animate-pulse">
            </div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-gray-200/50 rounded-full blur-3xl -z-10"></div>
        </div>


        <footer class="mt-12 md:mt-16 pb-8 text-center">
            <div class="max-w-4xl mx-auto flex flex-col items-center gap-4">
                <div class="flex gap-8 text-sm font-medium text-gray-500">
                    <a href="privacy/" class="hover:text-black transition-colors">Privacy Policy</a>
                    <a href="https://github.com/youssefsz/document-scanner-native-ios-app"
                        class="hover:text-black transition-colors">Open Source</a>
                    <a href="mailto:dhibi.ywsf@gmail.com" class="hover:text-black transition-colors">Support</a>
                </div>

                <p class="text-sm text-gray-500">
                    Created with ❤️ by <a href="https://youssef.tn"
                        class="text-gray-600 hover:text-apple-blue font-semibold underline decoration-apple-blue/10 underline-offset-4 transition-all"
                        target="_blank">Youssef Dhibi</a>
                </p>

                <p class="text-xs text-gray-500 opacity-60">
                    &copy; 2026 DocScanner: PDF Scan. All rights reserved.
                </p>
            </div>
        </footer>

    </section>


    <script>
        // Simple Screenshot Slider
        const screens = [
            document.getElementById('screen-1'),
            document.getElementById('screen-2')
        ];
        let currentIdx = 0;

        function rotateScreens() {
            screens[currentIdx].classList.replace('opacity-100', 'opacity-0');
            currentIdx = (currentIdx + 1) % screens.length;
            screens[currentIdx].classList.replace('opacity-0', 'opacity-100');
        }

        setInterval(rotateScreens, 4000);

    </script>
</body>

</html>
